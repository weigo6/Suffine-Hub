[build]
command = "python -m pip install --upgrade pip && python -m pip install \"zensical>=0.0.21\" && python -m zensical build --clean"
publish = "site"

[build.environment]
PYTHON_VERSION = "3.11"

[[redirects]]
from = "/*"
to = "https://acc.009420.xyz/:splat"
status = 302
force = true
conditions = { Country = ["CN"] }
